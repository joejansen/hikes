- slug: drakensberg-mnweni-circuit
  name: Mnweni Circuit (Northern Drakensberg)
  country: South Africa
  region: uKhahlamba-Drakensberg, KwaZulu-Natal / Lesotho border
  coordinates: [-28.85, 29.05]
  style: hut-to-hut
  accommodation: [bivy, camping]
  pack_weight: full
  length_km: 45
  length_days: 4
  elevation_gain_m: 2400
  difficulty: very-hard
  best_seasons: [April, May, September, October, November]
  highlights:
    - Wildest, least-regulated section of the Drakensberg - no permits beyond the Mnweni Cultural Centre fee
    - Sleeping caves like Mponjwane (Rockeries), Shepherd's, and Ledgers right under the escarpment spires
    - Pinnacles of Mnweni and the Rockeries are some of the most dramatic rock scenery in southern Africa
    - Big-pass days up Rockeries and down Mnweni Pass gain/lose ~1000 m of escarpment in a single push
    - Genuine wilderness feel - you can go days without seeing other hikers
  downsides:
    - Caves are exposed rock shelters - you carry a sleeping pad, bag, stove, and all food
    - Weather on the escarpment can flip from sun to lightning, snow, or thick mist within an hour
    - Navigation is on you (no marked trail above the contour path); a 1:50,000 map and prior Berg experience strongly recommended
  guide_links:
    - title: DrakensbergHiker - Mnweni Circuit full route description
      url: https://www.drakensberghiker.co.za/mnweni-drakensberg-circuit-route-description/
