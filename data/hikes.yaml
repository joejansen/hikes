  difficulty: moderate
  best_seasons: [June, July, August, September, October, November]
  highlights:
    - Land-based southern right whale watching from cliff-tops July-October
    - Slackpacking format - gear is shuttled between cottages so you walk with a daypack
    - Four well-equipped overnight cottages with hot showers, beds, and kitchens
    - Diverse terrain from Potberg fynbos to limestone coast and beach walking at Koppie Alleen
    - Bookings open well in advance and the trail is capped at 12 hikers, keeping it quiet
  downsides:
    - Day 1 over Potberg and the long beach day are still genuinely tiring (~16 km)
