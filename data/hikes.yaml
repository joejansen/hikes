- slug: tusheti-traverse
  name: Tusheti to Khevsureti Traverse (Omalo to Shatili)
  country: Georgia
  region: Tusheti / Khevsureti
  coordinates: [42.3667, 45.6333]
  style: hut-to-hut
  accommodation: [guesthouse, homestay, camping]
  pack_weight: light
  length_km: 75
  length_days: 6
  elevation_gain_m: 3500
  difficulty: hard
  best_seasons: [July, August, September]
  highlights:
    - Medieval Khevsur defensive tower villages at Shatili and Mutso
    - Crossing the Atsunta Pass (3431 m) between two near-abandoned highland regions
    - Alpine meadows and shepherd encampments almost untouched by tourism
    - One of Europe's most isolated inhabited cultural landscapes
  downsides:
    - Two or three nights require camping or bivy — accommodation is truly sparse
    - The Abano Pass road into Omalo is seasonal and 4x4 only
    - Atsunta Pass can close in bad weather with no easy alternative route
  guide_links:
    - title: Caucasus Trekking - Omalo to Shatili route reference
      url: https://www.caucasus-trekking.com/treks/trek-from-omalo-to-shatili
    - title: Going the Whole Hogg - Shatili to Omalo trip report
      url: https://www.goingthewholehogg.com/shatili-omalo-trek/
    - title: Travel Sauro - hiking Tusheti practical notes
      url: https://www.travelsauro.com/travel-hiking-tusheti/
  obscurity: 5
  status: researching
  notes: |
    The most obvious thematic sibling to Mestia-Ushguli: same country,
    same tower-village vibe, even more remote. Camping middle nights is
    a compromise on the hut-to-hut ideal but seems unavoidable.

