    - Sleeping in eight roadless îlets (La Nouvelle, Marla, Roche Plate, Aurère, Grand Place, Îlet à Bourse, Îlet à Malheur, Îlet des Lataniers)
    - Trois Roches waterfall and the Rivière des Galets canyon
    - Half-board family-run gîtes serving cari and rougail by lamplight
