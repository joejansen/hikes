- slug: mestia-to-ushguli
  name: Mestia to Ushguli
  country: Georgia
  region: Svaneti
  coordinates: [42.9, 42.95]
  style: hut-to-hut
  accommodation: [guesthouse, homestay]
  pack_weight: light
  length_km: 58
  length_days: 4
  elevation_gain_m: 3200
  difficulty: moderate
  best_seasons: [June, July, August, September]
  highlights:
    - Medieval Svan defensive towers in nearly every village
    - Remote feel with minimal crowds vs. Alpine classics
    - Home-cooked Georgian hospitality at village homestays
    - Ushguli is one of Europe's highest continuously inhabited settlements
  downsides:
    - Short season; high pass can close with weather
    - Infrastructure less developed than Alps
    - Getting to Mestia requires effort (overnight from Tbilisi or Kutaisi)
  guide_links:
    - title: Caucasus Trekking - detailed route reference
      url: https://www.caucasus-trekking.com/treks/trek-mestia-to-ushguli
    - title: Beyond Wild Places - 4-day trip report with homestay tips
      url: https://beyondwildplaces.com/complete-guide-to-the-mestia-to-ushguli-trek/
    - title: Going the Whole Hogg - Transcaucasian Trail Svaneti section
      url: https://www.goingthewholehogg.com/transcaucasian-trail-svaneti-mestia-to-ushguli/
  obscurity: 4
  status: shortlisted
  notes: |
    The tone-setter for this whole site: hut-to-hut without a full pack,
    authentic culture, not yet overrun. Template to compare new candidates against.

- slug: mardi-himal
  name: Mardi Himal Trek
  country: Nepal
  region: Annapurna
  coordinates: [28.45, 83.93]
  style: hut-to-hut
  accommodation: [teahouse]
  pack_weight: light
  length_km: 45
  length_days: 5
  elevation_gain_m: 2800
  difficulty: moderate
  best_seasons: [March, April, May, October, November]
  highlights:
    - Close-up views of Machapuchare (Fishtail) from High Camp
    - Much quieter than ABC or Everest routes
    - Rhododendron forests in spring are spectacular
    - Short enough to fit in a 10-day trip from abroad
  downsides:
    - High Camp (4100m) is cold and basic
    - Trail can be muddy below the tree line after rain
