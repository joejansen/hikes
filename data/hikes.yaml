  best_seasons: [November, December, January, February, March]
  highlights:
    - Mui Wo, Pui O, Ngong Ping, Tai O and Discovery Bay can anchor village-to-village stages
    - Lantau Peak, Sunset Peak, beaches, monasteries, ferries and old fishing villages in one compact island
    - Dense transport makes it easy to improvise without carrying camping gear
    - Urban-rural hybrid with real hiking but almost no wilderness logistics
  downsides:
    - Hot, humid summers are a bad idea
    - Some trail sections get busy on weekends and public holidays
    - Accommodation is plentiful for Hong Kong, but not cheap
