    - Four well-spaced overnight huts (Ngubu, Scott, Oakhurst, Andre) right on the coast
    - Bloukrans River crossing timed to low tide is the iconic crux of the trail
    - Afromontane forest, fynbos, dolphins, whales (in season), and otter sightings
    - Strict 12-hiker-per-day cap keeps the trail feeling wild
  downsides:
    - Books out roughly a year in advance through SANParks
    - You carry full pack including all five days of food; daily distances are short but undulating with relentless ascent/descent
    - Bloukrans crossing requires accurate tide timing and can be hazardous in heavy seas
  guide_links:
    - title: Stingy Nomads - detailed independent guide and day-by-day breakdown
      url: https://stingynomads.com/otter-hiking-trail-guide/
