  highlights:
    - Restored historic cross-Bhutan route once used by pilgrims, messengers and traders
    - Western and central sections can combine day stages with hotels and homestays
    - Bhutanese villages, dzongs, forests and high passes without committing to the Snowman Trek
    - Trail organization supports maintenance and communities along the route
  downsides:
    - Bhutan is expensive because of the Sustainable Development Fee and guided travel structure
    - Some multi-day sections still use signature campsites rather than village lodging
    - Independent improvisation is much less possible than in Nepal or India
