  length_days: 12
  elevation_gain_m: 6000
  difficulty: hard
  best_seasons: [March, April, October, November]
  highlights:
    - Walked exclusively on Bedouin-owned land with Bedouin guides from three (now eight) tribes
    - Camels carry water and gear, so trekking is light over otherwise punishing desert terrain
    - Sea-to-summit arc finishing on Jebel Katherine (2,629 m), Egypt's highest peak
    - Sleeping under the stars in remote wadis with no light pollution and no other hikers
    - Profits go directly to the Bedouin cooperative - rare community-tourism model that actually works
  downsides:
    - Long, hot, exposed walking days with very little shade and water rationed from camels
    - South Sinai still carries travel-advisory caveats from some governments
    - Food is simple (bread, beans, rice) for nearly two weeks straight
