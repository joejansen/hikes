  difficulty: moderate
  best_seasons: [March, April, May, October, November, December]
  highlights:
    - Hakka cultural greenway through foothill towns, camphor history and old market streets
    - Tea, tung blossom, forest paths, rural roads and small-town food culture
    - More obscure internationally than Danlan, but still tied to national greenway investment
    - Good candidate for mixing walking days with rail or local taxi transfers
  downsides:
    - Lodging is not always exactly on route, so purist continuous walking may be awkward
    - Summer heat and afternoon storms are a poor fit
    - English resources are still patchy compared with Taiwan's more famous hikes
  guide_links:
    - title: Taiwan Trails and Tales - Raknus Selu Trail guide
      url: https://taiwantrailsandtales.com/raknus-selu-trail/
