- slug: peaks-of-the-balkans
  name: Peaks of the Balkans
  country: Albania
  region: Prokletije / Accursed Mountains (AL/XK/ME)
  coordinates: [42.3933, 19.7667]
  style: hut-to-hut
  accommodation: [guesthouse, homestay]
  pack_weight: light
  length_km: 192
  length_days: 11
  elevation_gain_m: 9800
  difficulty: hard
  best_seasons: [June, July, August, September]
  highlights:
    - Tri-border loop through the Accursed Mountains (Prokletije)
    - Valbona-to-Theth pass with the most dramatic scenery in the Albanian Alps
    - Family-run guesthouses serving burek, rakia and home cheese
    - Remote alpine settlements at Doberdol and Milishevc
  downsides:
    - Cross-border permit required (usually via a local agency)
    - Waymarking is patchy in places; GPS track is strongly recommended
    - Livestock guardian dogs and some rough karst route-finding
  guide_links:
