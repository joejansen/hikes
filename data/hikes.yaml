  accommodation: [hut, refuge, hotel]
  pack_weight: light
  length_km: 165
  length_days: 10
  elevation_gain_m: 12000
  difficulty: very-hard
  best_seasons: [July, August, September]
  highlights:
    - Circumnavigates the second-highest massif in the Alps
