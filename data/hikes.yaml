  difficulty: hard
  best_seasons: [May, June, September, October]
  highlights:
    - Sacred circumambulation of Mount Kailash with intense Tibetan pilgrimage atmosphere
    - Guesthouses at Darchen, Dirapuk and Zutulpuk make it possible without camping
    - Dramatic high-plateau scenery and the Dolma La crossing above 5600 m
    - Completely different cultural frame from ordinary trekking
  downsides:
    - Very high altitude, remote medical access and basic dorm-style lodging
    - Foreign travelers need a Tibet Travel Permit and agency-arranged logistics
    - More pilgrimage than pleasant village-to-village walking
