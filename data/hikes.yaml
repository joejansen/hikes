    - 49 three-sided timber waugal shelters spaced a day's walk apart — the closest thing Australia has to an Alpine hut network
    - Diverse southwest WA ecosystems from jarrah and karri forest to granite outcrops, coastal heath, and the Southern Ocean at Albany
    - Trail towns including Dwellingup, Collie, Balingup, Pemberton, Northcliffe, Walpole, and Denmark each have pubs, shops, and local character
    - One of the world's great long-distance thru-hike routes, largely unknown outside Australia
    - Spring wildflowers (September–October) in the southwest are among the most biodiverse on Earth
  downsides:
    - At 1003km, this is a 6–8 week commitment — sections are possible but the full trail requires a sabbatical
    - Summer heat (November–March) and fire danger make sections genuinely dangerous; snakes are active
    - Waugal shelters are first-come-first-served; a tent is strongly recommended as backup
