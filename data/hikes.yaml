  difficulty: moderate
  best_seasons: [March, April, May, October, November]
  highlights:
    - Ancient caravan-road theme linking Shaxi, Lijiang, Tiger Leaping Gorge and Shangri-La-area villages
    - Naxi and Tibetan cultural landscapes, market towns, gorge walking and family guesthouses
    - Tiger Leaping Gorge high trail has established guesthouse stops with huge scenery
    - More open-ended and creative than a packaged classic trek
  downsides:
    - The Tea Horse Road is a network, not one clean continuous signed hiking trail
    - Some pieces require road transfers, local guides or custom planning
    - China travel logistics, language and mapping tools add friction
