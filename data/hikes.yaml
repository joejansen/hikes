  highlights:
    - Tea terraces, cedar forest, Tsou villages and mountain homestays around Shizhuo and Leye
    - Forest railway and buses make flexible starts and exits possible
    - Short walks like Mist Trail, Tea Trail, Cloud Trail and Eryanping can be stitched into a base-to-base trip
