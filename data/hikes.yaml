  obscurity: 3
  status: researching
  notes: |
    Rising fast in popularity but still feels frontier outside the
    Theth-Valbona corridor. Guesthouse/homestay mix is squarely in
    the Mestia-Ushguli format I want more of.

- slug: kackar-traverse
