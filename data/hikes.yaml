    - Toledo Ecotourism Association and host-family networks give the idea a community base
    - Easy to pair inland walking with Lubaantun, Nim Li Punit or Blue Creek
  downsides:
    - Public buses are sparse; a realistic route needs local coordination
    - Humidity, mud and river crossings can complicate walking in the wet season
    - Some village links are roads, so route quality will depend heavily on guide choice
  guide_links:
    - title: Toledo Ecotourism Association - community tourism program
      url: https://belizemayatourism.org/
    - title: My Guide Belize - Maya villages and host-family networks
      url: https://www.myguidebelize.com/belize/culture-art/maya-village
    - title: TIDE Tours - Toledo conservation and community tourism
      url: https://tidetours.org/
  obscurity: 5
  status: researching
  notes: |
    A cultural walking circuit more than a signed trail. Worth pursuing
    if the goal is creative, community-based travel with some hiking
    each day and a real bed each night.

